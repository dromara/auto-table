auto-table:
  enable: true
  mode: create
  auto-drop-column: true
  auto-drop-index: true
  auto-build-database: false
  model-package: org.dromara.autotable.test.springboot4

server:
  port: 9998

spring:
  datasource:
    url: jdbc:h2:mem:autotable-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  main:
    lazy-initialization: false

logging:
  level:
    org.dromara.autotable: debug
    org.springframework: info
